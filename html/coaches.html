<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QU4SAR Coaches</title>
  <link rel="icon" href="../QU4SAR.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css?v=4">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;background:var(--bg)}
    .redirect-box{padding:48px;max-width:480px}
    .redirect-box p{color:#888;font-size:14px;margin:16px 0 24px}
    .spinner{animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="loadingOverlay">
  <div class="loader-circle">
    <img src="../QU4SAR.ico" alt="QU4SAR" class="loader-logo">
  </div>
  <div class="loading-text">Cargando...</div>
</div>

  <div class="glass-card redirect-box">
    <img src="../QU4SAR.ico" alt="QU4SAR" style="width:64px;height:64px;object-fit:contain;border-radius:12px;margin-bottom:16px">
    <h1 class="gradient-text">QU4SAR Coaches</h1>
    <p><span class="spinner"><i data-lucide="loader" style="width:20px;height:20px"></i></span> Redirigiendo al panel de administración...</p>
    <a href="admin/dashboard.html" class="btn-primary" style="justify-content:center;display:inline-flex">Ir al Dashboard</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script>if(typeof lucide!=='undefined')lucide.createIcons();setTimeout(function(){window.location.href='admin/dashboard.html'},2000)</script>
</body>
</html>
